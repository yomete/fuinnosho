name: Fuinnosho
options:
  bundleIdPrefix: com.yomete
  deploymentTarget:
    iOS: "17.0"
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: 2.0.0
targets:
  Fuinnosho:
    type: application
    platform: iOS
    sources:
      - Fuinnosho
    dependencies:
      - package: Supabase
        product: Supabase
    configFiles:
      Debug: Fuinnosho/Configuration/Secrets.xcconfig
      Release: Fuinnosho/Configuration/Secrets.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yomete.fuinnosho
        PRODUCT_NAME: Fuinnosho
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Fuinnosho/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: 6.0
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 29Z33532UU
  FuinnoshoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - FuinnoshoTests
    dependencies:
      - target: Fuinnosho
    settings:
      base:
        SWIFT_VERSION: 6.0
